  <circle cx="178" cy="366" r="8" fill="#FF7C72"/>
  <circle cx="204" cy="366" r="8" fill="#F6D15A"/>
  <circle cx="230" cy="366" r="8" fill="#54D769"/>
  <text x="266" y="374" fill="#9FB9CB" font-family="SFMono-Regular, Menlo, monospace" font-size="18">local operator session</text>


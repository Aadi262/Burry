    <radialGradient id="cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 220) rotate(16) scale(420 280)">
      <stop stop-color="#35E4FF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#35E4FF" stop-opacity="0"/>

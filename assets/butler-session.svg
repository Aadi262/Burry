  <text x="216" y="596" fill="#7CE8FF" font-family="SFMono-Regular, Menlo, monospace" font-size="24">&gt; trending repos</text>
  <text x="216" y="626" fill="#9DB7C8" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="18">router -> github_trending agent</text>

  <rect x="782" y="566" width="626" height="118" rx="22" fill="url(#reply)" stroke="#244336"/>
  <text x="816" y="602" fill="#69F0C7" font-family="SFMono-Regular, Menlo, monospace" font-size="22">Butler</text>
  <text x="816" y="638" fill="#EDF8FF" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">- `Blaizzy/mlx-vlm` is hot for Mac-native VLM work.</text>
  <text x="816" y="668" fill="#EDF8FF" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">- `onyx-dot-app/onyx` is trending as an open-source AI platform.</text>


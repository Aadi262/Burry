  <text x="816" y="448" fill="#69F0C7" font-family="SFMono-Regular, Menlo, monospace" font-size="22">Butler</text>
  <text x="816" y="484" fill="#EDF8FF" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">- Gemma 4 discussion is leading local-model chatter.</text>
  <text x="816" y="514" fill="#EDF8FF" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">- OpenScreen and agent frameworks are climbing.</text>
  <text x="816" y="544" fill="#EDF8FF" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">- Community sentiment is shifting toward useful local tooling.</text>


    <text x="1230" y="183" fill="#D8F6FF" font-family="SFMono-Regular, Menlo, monospace" font-size="18">offline-first</text>
    <rect x="936" y="156" width="228" height="42" rx="14" fill="#101923" stroke="#1E3444"/>
    <text x="967" y="183" fill="#D8F6FF" font-family="SFMono-Regular, Menlo, monospace" font-size="18">free-source agents</text>

    <text x="436" y="173" fill="#D8F7FF" font-family="SFMono-Regular, Menlo, monospace" font-size="19">OFFLINE</text>

    <rect x="554" y="144" width="118" height="46" rx="15" fill="#101923" stroke="#1F3446"/>
    <text x="583" y="173" fill="#D8F7FF" font-family="SFMono-Regular, Menlo, monospace" font-size="19">OLLAMA</text>
